services:
  db:
    image: postgis/postgis:16-3.4
    # Official PostGIS images are amd64-only; pin the platform so the stack boots
    # deterministically everywhere (native on amd64/Linux/CI, emulated on Apple Silicon).
    platform: linux/amd64
    environment:
      POSTGRES_PASSWORD: gridwatch
      POSTGRES_USER: gridwatch
      POSTGRES_DB: gridwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwatch -d gridwatch"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://gridwatch:gridwatch@db:5432/gridwatch
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
