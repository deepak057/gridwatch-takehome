services:
  localstack:
    # Pinned to the last free (pre-auth-token) release. LocalStack's :latest began
    # requiring a paid LOCALSTACK_AUTH_TOKEN on 2026-03-23; 4.4.0 runs account-free.
    image: localstack/localstack:4.4.0
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

networks:
  default:
    name: localstack-net
